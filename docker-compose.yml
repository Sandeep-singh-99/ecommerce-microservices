services:
  # ============================================
  # API Gateway (Nginx)
  # ============================================
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      user-service:
         condition: service_healthy
      product-service:
         condition: service_healthy
      review-service:
         condition: service_healthy
    environment:
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # User Service
  # ============================================
  user-service:
    build:
      context: ./server
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Product Service
  # ============================================
  product-service:
    build:
      context: ./server
      dockerfile: services/product-service/Dockerfile
    container_name: product-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  review-service:
    build: 
      context: ./server
      dockerfile: services/review-service/Dockerfile
    container_name: review-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Client (React)
  # ============================================
  client:
    build: ./client
    container_name: e-commerce_client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - api-gateway
