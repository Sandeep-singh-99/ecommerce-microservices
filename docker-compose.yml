services:
  # ============================================
  # API Gateway (Nginx)
  # ============================================

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

    environment:
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Redis (for caching and session management)
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  # ============================================
  # User Service
  # ============================================

  user-service:
    build:
      context: ./server
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./server/services/user-service/app:/app/app
      - ./server/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Product Service
  # ============================================

  product-service:
    build:
      context: ./server
      dockerfile: services/product-service/Dockerfile
    container_name: product-service
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./server/services/product-service/app:/app/app
      - ./server/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Review Service
  # ============================================

  review-service:
    build:
      context: ./server
      dockerfile: services/review-service/Dockerfile
    container_name: review-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./server/services/review-service/app:/app/app
      - ./server/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Cart Service
  # ============================================

  cart-service:
    build:
      context: ./server
      dockerfile: services/cart-service/Dockerfile
    container_name: cart-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./server/services/cart-service/app:/app/app
      - ./server/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Order Service
  # ============================================

  order-service:
    build:
      context: ./server
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    expose:
      - "8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./server/services/order-service/app:/app/app
      - ./server/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ============================================
  # Payment Service
  # ============================================

  payment-service:
    build:
      context: ./server
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    expose:
      - "5000"
    environment:
      - PORT=5000
    env_file:
      - ./server/.env
    restart: unless-stopped
    volumes:
      - ./server/services/payment-service:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npx nodemon --exec ts-node src/server.ts"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # Client (React)
  # ============================================

  client:
    build: ./client
    container_name: e-commerce_client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - api-gateway
    restart: unless-stopped
